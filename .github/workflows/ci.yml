name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build
        env:
          # Provide stub env vars for build
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_stub
          CLERK_SECRET_KEY: sk_test_stub
          NOTION_API_KEY: secret_stub
          NOTION_DB_USERS: stub
          NOTION_DB_WORKSPACES: stub
          NOTION_DB_LEGAL_ENTITIES: stub
          NOTION_DB_ASSETS: stub
          NOTION_DB_LEASES: stub
          NOTION_DB_TENANTS: stub
          NOTION_DB_TRANSACTIONS: stub
          NOTION_DB_LOANS: stub
          NOTION_DB_AMORTIZATION_LINES: stub
          NOTION_DB_DOCUMENTS: stub
          ANTHROPIC_API_KEY: sk-ant-stub
          STRIPE_SECRET_KEY: sk_test_stub
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_stub
          STRIPE_WEBHOOK_SECRET: whsec_stub
          UPLOADTHING_SECRET: sk_live_stub
          UPLOADTHING_APP_ID: stub
          RESEND_API_KEY: re_stub
          NEXT_PUBLIC_APP_URL: http://localhost:3000
